<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 21st Birthday Amna ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="banner">
    <div class="scrolling-text">
      <span>🎀 Happy 21st Birthday Amna 🎀</span>
      <span>💖 It's Pookie's Day 💖</span>
      <span>🎀 Happy 21st Birthday Amna 🎀</span>
      <span>💖 It's Pookie's Day 💖</span>
    </div>
  </div>

  <audio id="bgMusic" autoplay loop><source src="birthday.mp3" type="audio/mpeg" /></audio>

  <div class="card">
    <span class="crown">👑</span>
    <h1 class="title">Happy 21st Birthday</h1>
    <span class="name-glow">AMNA ❤️</span>
    <span class="est-badge">✨ BEST. 2005 · ICONIC SINCE DAY ONE ✨</span>
    <p class="typewriter" id="type"></p>
    <button class="btn" onclick="location.href='wish.html'">Start your surprise 💌</button>
  </div>

  <button class="mute-btn" id="muteBtn">🔊</button>

  <script src="script.js"></script>
  <script>
    /* ⌨️ typewriter */
    const lines = [
      "21 years ago, the world got so much prettier 🎀",
      "Today is all about YOU, pookie 🩷",
      "Certified cutie since day one ✨"
    ];
    const typeEl = document.getElementById('type');
    let li = 0, ci = 0, deleting = false;
    (function type() {
      const line = lines[li];
      typeEl.textContent = line.slice(0, ci);
      if (!deleting && ci < line.length) { ci++; setTimeout(type, 55); }
      else if (!deleting) { deleting = true; setTimeout(type, 2200); }
      else if (ci > 0) { ci--; setTimeout(type, 25); }
      else { deleting = false; li = (li + 1) % lines.length; setTimeout(type, 400); }
    })();

    window.addEventListener('load', () => setTimeout(() => confettiBurst(220), 600));
  </script>
</body>
</html>
