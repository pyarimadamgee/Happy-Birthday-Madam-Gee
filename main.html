<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Happy Birthday ❤️</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* 🔇 Mute Button Styling */
        .mute-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.85);
            color: #333;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        .mute-btn:hover {
            background-color: white;
        }

        /* 🎈 Animate only text & button */
        .main-container h1 {
            animation: floaty 3s ease-in-out infinite;
        }

        .main-container p {
            animation: floaty 3s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        .main-container button {
            animation: floaty 3s ease-in-out infinite;
            animation-delay: 1s;
        }

        @keyframes floaty {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }
    </style>

</head>

<body class="main-page">
    <div class="navbar">
        <div class="scrolling-text">
            <span class="full-text">🎉 Happy Birthday To You 🎉</span>
            <span class="full-text">🎉 Happy Birthday To You 🎉</span>
            <span class="full-text">🎉 Happy Birthday To You 🎉</span>

            <span class="short-text">🎉 Happy Birthday 🎉</span>
            <span class="short-text">🎉 Happy Birthday 🎉</span>
            <span class="short-text">🎉 Happy Birthday 🎉</span>
        </div>
    </div>


    <!-- 🎇 Blast effect -->
    <div id="blast"></div>

    <!-- 🔊 Background Audio -->
    <audio id="birthday-audio" autoplay loop>
        <source src="birthday.mp3" type="audio/mpeg" />
    </audio>

    <!-- 🎁 Main Content -->
    <div class="container main-container">
        <h1 class="glow">🎉 Happy Birthday 🎉<br>Dear Friend</h1>
        <p class="sub shiny-line" style="color: black;">Wishing you all the love, joy and success in the world. 🥳</p>
        <button onclick="location.href='wish.html'">See Message 💌</button>
    </div>

    <!-- 🔇 Mute Button -->
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</button>

    <!-- 🔧 Script -->
    <script>
        const bgAudio = document.getElementById("birthday-audio");
        const muteBtn = document.getElementById("muteBtn");

        function toggleMute() {
            bgAudio.muted = !bgAudio.muted;
            muteBtn.textContent = bgAudio.muted ? "🔇" : "🔊";
        }
    </script>
    <script>
        const bodyClass = document.body.className;
        const navbar = document.querySelector('.navbar');

        const navbarStyles = {
            "main-page": "linear-gradient(90deg, #2c003e, #6a1b9a)",
            "memories-page": "linear-gradient(90deg, #7b1fa2, #ba68c8)",
            "finish-page": "linear-gradient(90deg, #6a1b9a, #25d6bf)",
            "final-page": "linear-gradient(90deg, #fcb69f, #ff6ec4)",
            "danger-page": "linear-gradient(90deg, #3a0000, #7b0000)"
        };

        if (navbar && navbarStyles[bodyClass]) {
            navbar.style.background = navbarStyles[bodyClass];
        }
    </script>


</body>

</html>
