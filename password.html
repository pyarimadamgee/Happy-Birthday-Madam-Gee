<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Secret 🔐</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="banner">
    <div class="scrolling-text">
      <span>🔐 Restricted area 🔐</span>
      <span>🎀 For one special girl only 🎀</span>
      <span>🔐 Restricted area 🔐</span>
      <span>🎀 For one special girl only 🎀</span>
    </div>
  </div>

  <div class="card" style="max-width:460px;">
    <span class="lock-emoji" id="lockEmoji">🔐</span>
    <h1 class="title">Top Secret, Pookie</h1>
    <p class="sub">This surprise is protected.<br>Prove it's really you, Amna 😌</p>
    <p class="sub" style="opacity:0.75;font-size:0.95rem;">Hint: you know exactly what I call you 😏</p>

    <input type="text" class="pw-input" id="pwInput" placeholder="enter the magic word…"
      autocomplete="off" autocapitalize="off" spellcheck="false" />
    <p class="pw-msg" id="pwMsg"></p>

    <button class="btn" onclick="checkPassword()">Unlock 🔓</button>
  </div>

  <button class="mute-btn" id="muteBtn" style="display:none;">🔊</button>

  <script src="script.js"></script>
  <script>
    const input = document.getElementById('pwInput');
    const msg = document.getElementById('pwMsg');
    const lockEmoji = document.getElementById('lockEmoji');
    let tries = 0;
    let unlocked = false;

    const roasts = [
      "nope, try again pookie 😌",
      "wrong!! think harder 😤",
      "it's literally SO obvious 🙄",
      "okay fine… it starts with M 🤭",
      "M _ _ O … I can't help you more than this 😭"
    ];

    input.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
    input.focus();

    function checkPassword() {
      if (unlocked) return;
      /* lowercase, strip emojis/symbols, collapse spaces — so "MOTO ❤️" still works */
      const val = input.value.toLowerCase().replace(/[^a-z ]/g, '').replace(/\s+/g, ' ').trim();
      const correct = {
        'moto': 'MOTO',
        'madam gee': 'Madam Gee',
        'amna gee': 'Amna Gee'
      };

      if (correct[val]) {
        unlocked = true;
        lockEmoji.textContent = '🔓';
        lockEmoji.classList.add('unlocked');
        msg.textContent = "welcome, " + correct[val] + " ❤️";
        msg.style.color = 'var(--hotpink)';
        confettiBurst(220);
        setTimeout(() => { window.location.href = 'main.html'; }, 1300);
      } else {
        tries++;
        msg.textContent = val === '' ? "you have to type something, silly 😅"
          : roasts[Math.min(tries - 1, roasts.length - 1)];
        msg.style.color = 'var(--hotpink)';
        const card = document.querySelector('.card');
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');
        input.select();
      }
    }
  </script>
</body>
</html>
